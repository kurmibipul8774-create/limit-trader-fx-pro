<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Limit Trader FX Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
</head>

<body>

<header>
<h1>🚀 Limit Trader FX Pro</h1>
<p>Professional Trading Journal</p>
</header>

<div class="dashboard">

<div class="card">
<h2>Total Trades</h2>
<h1 id="totalTrades">0</h1>
</div>

<div class="card">
<h2>Win Rate</h2>
<h1 id="winRate">0%</h1>
</div>

<div class="card">
<h2>Total Profit</h2>
<h1 id="totalProfit">$0</h1>
</div>

<div class="card">
<h2>Average R:R</h2>
<h1 id="averageRR">0</h1>
</div>

<div class="card">
<h2>A+ Setups</h2>
<h1 id="aPlus">0</h1>
</div>

<div class="card">
<h2>Profit Factor</h2>
<h1 id="profitFactor">0</h1>
</div>

</div>

<div class="menu">

<a href="add-trade.html">
<button>➕ Add Trade</button>
</a>

<a href="history.html">
<button>📋 Trade History</button>
</a>

<button id="installButton" style="display:none;">
📲 Install App
</button>

</div>

<script src="script.js"></script>

</body>
</html>
