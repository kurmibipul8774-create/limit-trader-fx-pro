<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Limit Trader FX Pro</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            🚀
            <h2>Limit Trader FX</h2>
            <p>Professional Journal</p>
        </div>

        <nav>

            <a href="index.html" class="active">
                📊 Dashboard
            </a>

            <a href="history.html">
                📋 Trade Log
            </a>

            <a href="#">
                📈 Analytics
            </a>

            <a href="#">
                📅 Calendar
            </a>

            <a href="#">
                🧠 Psychology
            </a>

            <a href="#">
                📜 Rules
            </a>

            <a href="#">
                ⚙ Settings
            </a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="content">

        <h1>Dashboard</h1>
        <p>Welcome back, Trader.</p>

        <div class="dashboard">

            <div class="card">
                <h3>Total Trades</h3>
                <h1 id="totalTrades">0</h1>
            </div>

            <div class="card">
                <h3>Win Rate</h3>
                <h1 id="winRate">0%</h1>
            </div>

            <div class="card">
                <h3>Total Profit</h3>
                <h1 id="totalProfit">$0</h1>
            </div>

            <div class="card">
                <h3>Average R:R</h3>
                <h1 id="averageRR">0</h1>
            </div>

            <div class="card">
                <h3>A+ Setups</h3>
                <h1 id="aPlus">0</h1>
            </div>

            <div class="card">
                <h3>Profit Factor</h3>
                <h1 id="profitFactor">0</h1>
            </div>

        </div>

        <div class="buttons">

            <a href="add-trade.html">
                <button>➕ Add Trade</button>
            </a>

            <a href="history.html">
                <button>📋 Trade History</button>
            </a>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
